name: Matrix Demo
on: push

jobs:
    build:
        # continue-on-error: true
        strategy:
            matrix: 
                operating-system: [ubuntu-latest, windows-latest]
                node-version: [12, 16]
        runs-on: ubuntu-latest
        steps:
        -   name: Get code
            uses: actions/checkout@v7
        -   name: Install NodeJS
            uses: actions/setup-node@v3
            with:
                node-version: 16
        -   name: Install dependencies
            run: npm ci
        -   name: Build project
            run: npm run build
            
            
