name: Matrix Demo
on: push

jobs:
    build:
        strategy:
            matrix: 
                operating-system: [ubuntu-latest, windows-latest]
                node-version: [16, 24]
        runs-on: ubuntu-latest
        steps:
        -   name: Get code
            uses: actions/checkout@v7
        -   name: Install NodeJS
            uses: actions/setup-node@v4
            with:
                node-version: 24
        -   name: Install dependencies
            run: npm ci
        -   name: Build project
            run: npm run build
            
            
